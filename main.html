<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title></title>
	<meta name="description" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="/styles.css">
</head>

<body>
	
	<div class="container">

    <!-- Product Photo Section -->
    <div class="product__photo">
        <div class="photo-container">

            <!-- Main Photo -->
            <div class="photo-main">
                <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce" alt="Red Apple">
            </div>

            <!-- Photo Album -->
            <div class="photo-album">
                <ul>
                    <li><img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce" alt="Red Apple"></li>
                    <li><img src="https://images.unsplash.com/photo-1574226516831-e1dff420e12c" alt="Green Apple"></li>
                    <li><img src="https://images.unsplash.com/photo-1589927986089-35812388d1f4" alt="Yellow Apple"></li>
                    <li><img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2" alt="Orange Apple"></li>
                </ul>
            </div>

        </div>
    </div>

    <!-- Product Info Section -->
    <div class="product__info">

        <h1>Fresh Organic Apples</h1>

        <div class="price">$7.93</div>

        <!-- Variant Section -->
        <div class="variant">
            <h3>Varieties</h3>
            <div class="colors">
                <span class="green"></span>
                <span class="yellow"></span>
                <span class="orange"></span>
                <span class="red"></span>
            </div>
        </div>

        <!-- Benefits Section -->
        <div class="description">
            <h3>BENEFITS</h3>
            <ul>
                <li>Rich in fiber and Vitamin C</li>
                <li>Boosts immunity</li>
                <li>Supports heart health</li>
                <li>Low in calories and nutritious</li>
            </ul>
        </div>

        <!-- Add to Cart Button -->
        <button class="add-to-cart">ADD TO CART</button>

    </div>

</div>

</body>

</html>
